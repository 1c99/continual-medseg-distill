experiment:
  name: continual_medseg_scaffold
  seed: 42

includes:
  task: configs/tasks/ct_mri_sequence.yaml
  method: configs/methods/finetune.yaml
  dataset: configs/datasets/open_source_examples.yaml

runtime:
  device: auto

model:
  name: monai_unet
  in_channels: 1
  out_channels: 3
  channels: [16, 32, 64, 128]
  strides: [2, 2, 2]
  num_res_units: 2

train:
  epochs: 2
  lr: 0.001
  max_steps_per_epoch: 10

data:
  source: synthetic
  batch_size: 2
  val_batch_size: 2
  synthetic:
    train_samples: 16
    val_samples: 8
    channels: 1
    num_classes: 3
    shape: [32, 32, 32]
