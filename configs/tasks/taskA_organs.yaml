# Task A: Abdominal Organ Segmentation (TotalSegmentator)
#
# 15 classes: 0=background, 1-14=organs (see below)
#
# All major abdominal/pelvic organs in TotalSegmentator.
# No overlap with Task B (muscles).

task:
  id: taskA_organs
  description: "Abdominal organ segmentation (14 organs)"

  classes:
    0: background
    1: liver
    2: spleen
    3: kidney_left
    4: kidney_right
    5: pancreas
    6: gallbladder
    7: stomach
    8: duodenum
    9: small_bowel
    10: colon
    11: esophagus
    12: adrenal_gland_left
    13: adrenal_gland_right
    14: urinary_bladder

  num_classes: 15  # including background

  organs:
    - liver
    - spleen
    - kidney_left
    - kidney_right
    - pancreas
    - gallbladder
    - stomach
    - duodenum
    - small_bowel
    - colon
    - esophagus
    - adrenal_gland_left
    - adrenal_gland_right
    - urinary_bladder

# Data override: use these organs in the TotalSeg loader
data:
  source: totalseg
  totalseg:
    organs:
      - liver
      - spleen
      - kidney_left
      - kidney_right
      - pancreas
      - gallbladder
      - stomach
      - duodenum
      - small_bowel
      - colon
      - esophagus
      - adrenal_gland_left
      - adrenal_gland_right
      - urinary_bladder

# Model override: 15 output channels (BG + 14 organs)
model:
  out_channels: 15
