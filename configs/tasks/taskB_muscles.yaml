# Task B: Muscle Segmentation (TotalSegmentator)
#
# 11 classes: 0=background, 1-10=muscles (see below)
#
# All muscles available in TotalSegmentator.
# No overlap with Task A (organs).
# Clinically relevant for sarcopenia and body composition assessment.

task:
  id: taskB_muscles
  description: "Muscle segmentation (10 muscles)"

  classes:
    0: background
    1: gluteus_maximus_left
    2: gluteus_maximus_right
    3: gluteus_medius_left
    4: gluteus_medius_right
    5: gluteus_minimus_left
    6: gluteus_minimus_right
    7: iliopsoas_left
    8: iliopsoas_right
    9: autochthon_left
    10: autochthon_right

  num_classes: 11  # including background

  organs:
    - gluteus_maximus_left
    - gluteus_maximus_right
    - gluteus_medius_left
    - gluteus_medius_right
    - gluteus_minimus_left
    - gluteus_minimus_right
    - iliopsoas_left
    - iliopsoas_right
    - autochthon_left
    - autochthon_right

# Data override: use these muscles in the TotalSeg loader
data:
  source: totalseg
  totalseg:
    organs:
      - gluteus_maximus_left
      - gluteus_maximus_right
      - gluteus_medius_left
      - gluteus_medius_right
      - gluteus_minimus_left
      - gluteus_minimus_right
      - iliopsoas_left
      - iliopsoas_right
      - autochthon_left
      - autochthon_right

# Model override: 11 output channels (BG + 10 muscles)
model:
  out_channels: 11
