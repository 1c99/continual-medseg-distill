# Continual Learning Sequence: Task A (Organs) → Task B (Muscles)
#
# Class-incremental setting on TotalSegmentator:
# - Task A: 14 abdominal organs
# - Task B: 10 muscles (gluteus, iliopsoas, autochthon)
#
# Both tasks share the same subjects (same CT scans) but different
# segmentation targets. No class overlap between A and B.
#
# Task A uses classes 0-14 (15 channels), Task B uses classes 0-10 (11 channels).
# The output head must be managed per-task (class-incremental or multi-head).

task_sequence:
  name: totalseg_organs_muscles_AB
  setting: task_incremental

  tasks:
    - id: taskA_organs
      description: "Abdominal organ segmentation (14 organs)"
      data:
        source: totalseg
        totalseg:
          organs:
            - liver
            - spleen
            - kidney_left
            - kidney_right
            - pancreas
            - gallbladder
            - stomach
            - duodenum
            - small_bowel
            - colon
            - esophagus
            - adrenal_gland_left
            - adrenal_gland_right
            - urinary_bladder
      model:
        out_channels: 15

    - id: taskB_muscles
      description: "Muscle segmentation (10 muscles)"
      data:
        source: totalseg
        totalseg:
          organs:
            - gluteus_maximus_left
            - gluteus_maximus_right
            - gluteus_medius_left
            - gluteus_medius_right
            - gluteus_minimus_left
            - gluteus_minimus_right
            - iliopsoas_left
            - iliopsoas_right
            - autochthon_left
            - autochthon_right
      model:
        out_channels: 11
