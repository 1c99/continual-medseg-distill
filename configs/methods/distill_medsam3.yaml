# Distillation with MedSAM3 teacher
# Usage: --method-config configs/methods/distill_medsam3.yaml
#
# Requires:
#   - MedSAM3 cloned: bash scripts/setup_external.sh --medsam3
#   - MedSAM3 checkpoint at ckpt_path below
#
# The MedSAM3 backend extracts visual features slice-by-slice from 3D
# volumes and projects them to dense segmentation logits via a lightweight
# adapter. MedSAM3 is SAM3 fine-tuned for medical segmentation.

method:
  name: distill
  kd:
    mode: logit
    weight: 0.7
    temperature: 2.0
    cache:
      enabled: false
    teacher:
      type: medsam3
      ckpt_path: auto                              # download base SAM3 from HuggingFace
      model_id: medsam3_pretrained
      output_channels: 15                          # initial (Task A); reconfigured per task automatically
      adapter_channels: 256                        # backbone feature dim
      adapter_ckpt_path: checkpoints/medsam3_adapter_taskA.pt  # pre-trained via pretrain_teacher_adapter.py
      lora_path: checkpoints/medsam3_lora.pt       # MedSAM3 LoRA fine-tuning weights
