# Distillation with MedSAM2 external teacher
# Usage: --method-config configs/methods/distill_medsam2.yaml
#
# MedSAM2 (bowang-lab) extracts Hiera features slice-by-slice, projected
# through a lightweight 3D adapter. Adapter is rebuilt per task automatically.
#
# Requires: third_party/medsam2/ cloned + checkpoint downloaded

method:
  name: distill
  kd:
    mode: logit
    weight: 0.7
    temperature: 2.0
    cache:
      enabled: false
    teacher:
      type: medsam2
      ckpt_path: third_party/medsam2/checkpoints/MedSAM2_latest.pt
      config_file: configs/sam2.1_hiera_t512.yaml
      model_id: medsam2_teacher
      output_channels: 15    # initial (Task A); reconfigured per task automatically
      adapter_channels: 256
      adapter_ckpt_path: checkpoints/medsam2_adapter_taskA.pt  # pre-trained via pretrain_teacher_adapter.py
