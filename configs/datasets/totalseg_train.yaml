# TotalSegmentator training config (100 train / 20 val, liver segmentation)
# Workstation: /media/user/data2/data2/data
data:
  source: totalseg
  batch_size: 2
  val_batch_size: 2
  totalseg:
    root: /media/user/data2/data2/data/Totalsegmentator_dataset
    organ: liver
    shape: [128, 128, 128]
    split_manifest: data/splits/totalseg_train_v1.json

model:
  in_channels: 1
  out_channels: 2

train:
  epochs: 50
  lr: 0.001
  loss_type: dicece
