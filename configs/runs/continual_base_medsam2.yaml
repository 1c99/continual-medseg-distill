# Continual learning base config with MedSAM2 teacher for KD methods.
# Used as --base-config for run_continual.py with KD method configs.

experiment:
  name: continual_medsam2
  seed: 42

runtime:
  device: auto

model:
  name: monai_unet
  in_channels: 1
  out_channels: 15         # Task A: BG + 14 organs (reconfigured per task by multi-head)
  channels: [16, 32, 64, 128]
  strides: [2, 2, 2]
  num_res_units: 2

method:
  name: distill
  kd:
    mode: logit
    weight: 0.7
    temperature: 2.0
    cache:
      enabled: false
    teacher:
      type: medsam2
      ckpt_path: third_party/medsam2/checkpoints/MedSAM2_latest.pt
      config_file: configs/sam2.1_hiera_t512.yaml
      model_id: medsam2_continual
      output_channels: 15   # initial (Task A); reconfigured per task automatically

data:
  source: totalseg
  batch_size: 2
  val_batch_size: 2
  totalseg:
    root: /media/user/data2/data2/data/Totalsegmentator_dataset
    shape: [64, 64, 64]
    split_manifest: data/splits/totalseg_train_clean_v1.json

train:
  epochs: 5
  lr: 0.001
  max_steps_per_epoch: 20
  loss_type: dicece

output:
  dir: outputs/continual
  best_metric: voxel_acc
  best_mode: max
