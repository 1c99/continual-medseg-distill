# Real-Checkpoint Sprint: Finetune Baseline on Task A (5 organs)
# Paired with realckpt_kd_taskA.yaml for controlled comparison.
# Short validation run — not publication-quality.

experiment:
  name: realckpt_finetune_taskA
  seed: 42

runtime:
  device: auto

model:
  name: monai_unet
  in_channels: 1
  out_channels: 6          # BG + 5 organs
  channels: [16, 32, 64, 128]
  strides: [2, 2, 2]
  num_res_units: 2

method:
  name: finetune

data:
  source: totalseg
  batch_size: 2
  val_batch_size: 2
  totalseg:
    root: /media/user/data2/data2/data/Totalsegmentator_dataset
    organs:
      - liver
      - spleen
      - kidney_left
      - kidney_right
      - pancreas
    shape: [64, 64, 64]
    split_manifest: data/splits/totalseg_train_clean_v1.json

train:
  epochs: 5
  lr: 0.001
  max_steps_per_epoch: 20
  loss_type: dicece

output:
  dir: outputs/realckpt_benchmark/finetune_taskA
  best_metric: voxel_acc
  best_mode: max
